stages:
  - build

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

.build:
  variables:
    GRADLE_USER_HOME: $CI_PROJECT_DIR/.gradle
  stage: build
  script:
    - ./gradlew --build-cache --warning-mode=all build
  cache:
    - key:
        files:
          - gradle/wrapper/gradle-wrapper.properties
      paths:
        - .gradle/wrapper
    - key: "${CI_COMMIT_REF_SLUG}_${CI_JOB_NAME_SLUG}"
      fallback_keys:
        - "${CI_DEFAULT_BRANCH_SLUG}_${CI_JOB_NAME_SLUG}"
      paths:
        - .gradle/caches
  artifacts:
    when: always
    paths:
      # JUNIT test report
      - build/test-results/test/TEST-*.xml
    reports:
      junit:
        - build/test-results/test/TEST-*.xml

build:java8:
  image: eclipse-temurin:8-jdk@sha256:1ba7e0680eea83f1517ed309faa290559420e9c7345183021e5213d568442300
  extends: .build
  allow_failure: true

